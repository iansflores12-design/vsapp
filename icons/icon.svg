<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7B3FC4"/>
      <stop offset="100%" style="stop-color:#4A1080"/>
    </linearGradient>
    <linearGradient id="bg2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#9B59B6"/>
      <stop offset="100%" style="stop-color:#6750A4"/>
    </linearGradient>
  </defs>
  <!-- Background rounded rect -->
  <rect width="512" height="512" rx="115" fill="url(#bg)"/>
  <!-- Book icon centered -->
  <g transform="translate(256,256)">
    <!-- Book left page -->
    <path d="M-110,-120 L-110,120 Q-110,140 -90,140 L10,140 L10,-140 L-90,-140 Q-110,-140 -110,-120 Z"
          fill="#C084FC" opacity="0.9"/>
    <!-- Book right page -->
    <path d="M10,-140 L10,140 L110,140 Q130,140 130,120 L130,-120 Q130,-140 110,-140 Z"
          fill="#E9D5FF" opacity="0.95"/>
    <!-- Spine -->
    <rect x="-8" y="-140" width="16" height="280" fill="#7B3FC4" rx="4"/>
    <!-- Lines on left page -->
    <line x1="-90" y1="-60" x2="-20" y2="-60" stroke="#7B3FC4" stroke-width="8" stroke-linecap="round" opacity="0.6"/>
    <line x1="-90" y1="-20" x2="-20" y2="-20" stroke="#7B3FC4" stroke-width="8" stroke-linecap="round" opacity="0.6"/>
    <line x1="-90" y1="20" x2="-20" y2="20" stroke="#7B3FC4" stroke-width="8" stroke-linecap="round" opacity="0.6"/>
    <line x1="-90" y1="60" x2="-40" y2="60" stroke="#7B3FC4" stroke-width="8" stroke-linecap="round" opacity="0.4"/>
    <!-- Lines on right page -->
    <line x1="20" y1="-60" x2="100" y2="-60" stroke="#6750A4" stroke-width="8" stroke-linecap="round" opacity="0.5"/>
    <line x1="20" y1="-20" x2="100" y2="-20" stroke="#6750A4" stroke-width="8" stroke-linecap="round" opacity="0.5"/>
    <line x1="20" y1="20" x2="100" y2="20" stroke="#6750A4" stroke-width="8" stroke-linecap="round" opacity="0.5"/>
    <line x1="20" y1="60" x2="70" y2="60" stroke="#6750A4" stroke-width="8" stroke-linecap="round" opacity="0.3"/>
  </g>
</svg>